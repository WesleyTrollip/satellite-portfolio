services:
  api:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /workspace
    command: dotnet watch --project src/api/SatellitePortfolio.Api/SatellitePortfolio.Api.csproj run --urls http://0.0.0.0:8080
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PortfolioDb: Host=postgres;Port=5432;Database=satellite_portfolio;Username=satellite;Password=satellite
      Cors__AllowedOrigins__0: http://localhost:3000
    volumes:
      - ../..:/workspace
      - satellite_dotnet_nuget:/root/.nuget/packages

  web:
    image: node:22-bookworm-slim
    working_dir: /workspace/src/web/satellite-portfolio-web
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5014/api
      WATCHPACK_POLLING: "true"
    volumes:
      - ../..:/workspace
      - satellite_web_node_modules:/workspace/src/web/satellite-portfolio-web/node_modules

  risk-worker:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /workspace
    command: dotnet watch --project src/workers/SatellitePortfolio.RiskWorker/SatellitePortfolio.RiskWorker.csproj run
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PortfolioDb: Host=postgres;Port=5432;Database=satellite_portfolio;Username=satellite;Password=satellite
    volumes:
      - ../..:/workspace
      - satellite_dotnet_nuget:/root/.nuget/packages

  marketdata-worker:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /workspace
    command: dotnet watch --project src/workers/SatellitePortfolio.MarketDataWorker/SatellitePortfolio.MarketDataWorker.csproj run
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    volumes:
      - ../..:/workspace
      - satellite_dotnet_nuget:/root/.nuget/packages

volumes:
  satellite_dotnet_nuget:
  satellite_web_node_modules:
